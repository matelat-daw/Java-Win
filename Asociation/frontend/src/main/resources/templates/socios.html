<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Socios</title>
    <!-- CSS de Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                <h2 class="h4 mb-0">Nuestros Socios Registrados</h2>
                <span class="badge bg-light text-primary fs-6" th:text="${#lists.size(socios)} + ' Socios'">0 Socios</span>
            </div>
            <div class="card-body p-4 bg-white">
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle border mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" style="width: 20%;">ID Socio</th>
                                <th scope="col">Nombre Completo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Iteración de registros -->
                            <tr th:each="socio : ${socios}">
                                <td class="fw-bold text-secondary" th:text="${socio.id}">0</td>
                                <td th:text="${socio.nombre}">Nombre no disponible</td>
                            </tr>
                            <!-- Mensaje de alerta elegante si no hay datos -->
                            <tr th:if="${#lists.isEmpty(socios)}">
                                <td colspan="2" class="text-center py-4 text-muted">
                                    <div class="alert alert-warning d-inline-block mb-0" role="alert">
                                        No se encontraron socios registrados en el microservicio.
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4">
                    <!-- Botón para regresar con estilo secundario -->
                    <a th:href="@{/}" class="btn btn-outline-secondary">
                        Volver al Panel Central
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
