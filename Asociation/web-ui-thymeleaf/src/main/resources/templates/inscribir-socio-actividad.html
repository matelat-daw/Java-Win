<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscribir Socio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-success text-white py-3">
                <h2 class="h4 mb-0">Inscribir Socio en Actividad</h2>
            </div>
            <div class="card-body p-4 bg-white">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="text-muted small">Actividad</div>
                        <div class="fw-semibold" th:text="${actividad.titulo}">Título</div>
                    </div>
                    <div class="col-md-3">
                        <div class="text-muted small">ID Actividad</div>
                        <div class="fw-semibold" th:text="${actividad.id}">0</div>
                    </div>
                    <div class="col-md-3">
                        <div class="text-muted small">Fecha</div>
                        <div class="fw-semibold" th:text="${actividad.fecha}">2026-01-01</div>
                    </div>
                </div>

                <form th:action="@{/actividades/{id}/inscribir(id=${actividad.id})}" method="post" class="mb-4">
                    <label for="socioId" class="form-label">Selecciona el socio a inscribir</label>
                    <div class="d-flex gap-2">
                        <select id="socioId" name="socioId" class="form-select" required>
                            <option value="" disabled selected>Elige un socio</option>
                            <option th:each="socio : ${socios}"
                                    th:value="${socio.id}"
                                    th:text="|${socio.nombre} (ID: ${socio.id})|">
                                Socio
                            </option>
                        </select>
                        <button type="submit" class="btn btn-success">Inscribir</button>
                    </div>
                </form>

                <h3 class="h5 mb-3">Lista de Socios Disponibles</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle border mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" style="width: 12%;">ID</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Email</th>
                                <th scope="col" style="width: 18%;">Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="socio : ${socios}">
                                <td th:text="${socio.id}">0</td>
                                <td th:text="${socio.nombre}">Nombre</td>
                                <td th:text="${socio.email}">correo@dominio.com</td>
                                <td th:text="${socio.estado}">ACTIVO</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(socios)}">
                                <td colspan="4" class="text-center py-4 text-muted">
                                    <div class="alert alert-warning d-inline-block mb-0" role="alert">
                                        No hay socios disponibles para inscribir.
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <a th:href="@{/actividades}" class="btn btn-outline-success">Volver a Actividades</a>
                    <a th:href="@{/}" class="btn btn-outline-secondary">Panel Central</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
