<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Actividades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                <h2 class="h4 mb-0">Nuestras Actividades Registradas</h2>
                <span class="badge bg-light text-success fs-6" th:text="${#lists.size(actividades)} + ' Actividades'">0 Actividades</span>
            </div>
            <div class="card-body p-4 bg-white">
                <div class="d-flex justify-content-end mb-3">
                    <a th:href="@{/actividades/nueva}" class="btn btn-success">
                        Nueva Actividad
                    </a>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle border mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" style="width: 10%;">ID</th>
                                <th scope="col">Título</th>
                                <th scope="col">Descripción</th>
                                <th scope="col" style="width: 15%;">Fecha</th>
                                <th scope="col" style="width: 10%;">Plazas</th>
                                <th scope="col" style="width: 18%;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="actividad : ${actividades}">
                                <td class="fw-bold text-secondary" th:text="${actividad.id}">0</td>
                                <td th:text="${actividad.titulo}">Título no disponible</td>
                                <td th:text="${actividad.descripcion}">Descripción no disponible</td>
                                <td th:text="${actividad.fecha}">Fecha no disponible</td>
                                <td th:text="${actividad.plazas}">0</td>
                                <td>
                                    <a th:href="@{/actividades/{id}/inscribir(id=${actividad.id})}" class="btn btn-sm btn-outline-success">Inscribir socio</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(actividades)}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <div class="alert alert-warning d-inline-block mb-0" role="alert">
                                        No se encontraron actividades registradas en el microservicio.
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-outline-secondary">
                        Volver al Panel Central
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
