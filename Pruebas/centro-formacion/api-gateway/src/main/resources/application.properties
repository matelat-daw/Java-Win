spring.application.name=api-gateway
spring.cloud.gateway.server.webflux.routes[0].id=formacion-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://formacion-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/**
server.port=8089
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true