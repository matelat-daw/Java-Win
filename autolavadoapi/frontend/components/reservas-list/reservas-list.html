<div class="container pb-4">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <h2 class="mb-0">Reservas</h2>
      <div class="text-muted">Gestión</div>
    </div>
    <a class="btn btn-primary" href="/reservas/nueva" data-link>Nueva reserva</a>
  </div>

  <form class="card shadow-sm border-0 mb-3" data-filtros>
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label">Matrícula</label>
          <input class="form-control" type="text" name="matricula" placeholder="Buscar..." />
        </div>
        <div class="col-12 col-md-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="soloPendientes" name="pendientes" />
            <label class="form-check-label" for="soloPendientes">Solo pendientes</label>
          </div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Orden</label>
          <select class="form-select" name="sort">
            <option value="">Sin orden</option>
            <option value="nombre">Nombre</option>
            <option value="fecha">Fecha</option>
            <option value="precio">Precio</option>
            <option value="estado">Estado</option>
          </select>
        </div>
        <div class="col-6 col-md-1">
          <label class="form-label">Dir</label>
          <select class="form-select" name="dir">
            <option value="asc">Asc</option>
            <option value="desc">Desc</option>
          </select>
        </div>
        <div class="col-6 col-md-1 d-grid">
          <button class="btn btn-outline-primary" type="submit">Aplicar</button>
        </div>
      </div>
    </div>
  </form>

  <div class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Cliente</th>
            <th>Matrícula</th>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th class="text-end">Total</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody data-rows></tbody>
      </table>
    </div>
    <div class="card-footer bg-white border-0 d-flex align-items-center justify-content-between flex-wrap gap-2">
      <div class="text-muted small" data-summary></div>
      <nav aria-label="Paginación">
        <ul class="pagination pagination-sm mb-0" data-pagination></ul>
      </nav>
    </div>
  </div>
</div>
