<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mascotas | Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>

<body class="app-shell">
    <header class="navbar navbar-expand-lg navbar-dark vet-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">ClinicaMVC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navClinica" aria-controls="navClinica" aria-expanded="false" aria-label="Navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navClinica">
                <div class="navbar-nav ms-auto gap-2">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                    <a class="nav-link active" th:href="@{/mascotas}">Mascotas</a>
                    <a class="btn btn-light btn-sm fw-semibold ms-lg-2" th:href="@{/mascotas/nueva}">Nueva mascota</a>
                </div>
            </div>
        </div>
    </header>
    <main class="container py-5">
        <div class="d-flex flex-column flex-lg-row gap-3 justify-content-between align-items-lg-center mb-4">
            <div>
                <p class="text-uppercase text-success fw-semibold small mb-1">Gestión clínica</p>
                <h1 class="display-6 fw-bold mb-0">Mascotas registradas</h1>
            </div>
            <a class="btn btn-success btn-lg px-4" th:href="@{/mascotas/nueva}">Registrar mascota</a>
        </div>
        <div th:if="${exito}" class="alert alert-success shadow-sm border-0" role="alert" th:text="${exito}"></div>
        <div th:if="${error}" class="alert alert-danger shadow-sm border-0" role="alert" th:text="${error}"></div>
        <div th:if="${#lists.isEmpty(mascotas)}" class="empty-state text-center py-5">
            <div class="empty-icon mb-3">🐶</div>
            <h2 class="h4 fw-bold">No hay mascotas registradas.</h2>
            <p class="text-body-secondary mb-4">Agrega la primera mascota para comenzar con la gestión de la clínica.</p>
            <a class="btn btn-success btn-lg" th:href="@{/mascotas/nueva}">Nueva mascota</a>
        </div>
        <div th:unless="${#lists.isEmpty(mascotas)}" class="card border-0 shadow-lg overflow-hidden">
            <div class="table-responsive">
                <table class="table align-middle mb-0 table-hover">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Especie</th>
                            <th>Propietario</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${mascotas}">
                            <td class="fw-semibold" th:text="${m.id}"></td>
                            <td th:text="${m.nombre}"></td>
                            <td><span class="badge rounded-pill text-bg-light species-pill" th:text="${m.especie}"></span></td>
                            <td th:text="${m.propietario}"></td>
                            <td>
                                <span class="badge rounded-pill status-pill" th:classappend="${m.estado == 'PENDIENTE'} ? 'text-bg-warning' : 'text-bg-success'" th:text="${m.estado}"></span>
                            </td>
                            <td class="text-end">
                                <div class="d-inline-flex flex-wrap gap-2 justify-content-end">
                                    <a class="btn btn-outline-success btn-sm" th:href="@{/mascotas/{id}(id=${m.id})}">Ver detalle</a>
                                    <form th:if="${m.estado == 'PENDIENTE'}" th:action="@{/mascotas/{id}/atender(id=${m.id})}" method="post" class="d-inline">
                                        <button class="btn btn-success btn-sm" type="submit">Atender</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
