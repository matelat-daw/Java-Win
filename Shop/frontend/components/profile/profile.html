<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h1 class="h4 mb-0">Mi perfil</h1>
                <button class="btn btn-outline-secondary btn-sm" onclick="navigate('home')">Volver</button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="row g-4 align-items-center">
                        <div class="col-12 col-md-4 text-center">
                            <img src="{{profileImageUrl}}" alt="Foto de perfil" class="rounded-circle border" style="width: 160px; height: 160px; object-fit: cover;">
                            <div class="mt-2 small text-muted">{{email}}</div>
                            <div class="mt-1">
                                <span class="badge text-bg-primary">{{role}}</span>
                            </div>
                        </div>
                        <div class="col-12 col-md-8">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Nick</div>
                                    <div class="fw-semibold">{{nick}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Nombre</div>
                                    <div class="fw-semibold">{{name}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Apellido 1</div>
                                    <div class="fw-semibold">{{surname1}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Apellido 2</div>
                                    <div class="fw-semibold">{{surname2}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Teléfono</div>
                                    <div class="fw-semibold">{{phone}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Género</div>
                                    <div class="fw-semibold">{{gender}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Nacimiento</div>
                                    <div class="fw-semibold">{{bday}}</div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <div class="text-muted small">Estado</div>
                                    <div class="fw-semibold">{{status}}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info mt-3 mb-0">
                La edición de perfil y la subida de foto se pueden habilitar después si quieres.
            </div>
        </div>
    </div>
</div>
