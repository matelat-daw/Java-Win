<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Iniciar sesión</h1>
                    <form id="loginForm" class="vstack gap-3">
                        <div>
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" name="email" required autocomplete="username">
                        </div>
                        <div>
                            <label class="form-label">Contraseña</label>
                            <input class="form-control" type="password" name="password" required autocomplete="current-password">
                        </div>
                        <button class="btn btn-primary" type="submit">Entrar</button>
                        <div class="text-muted small">
                            ¿No tienes cuenta? <a href="/register" onclick="event.preventDefault(); navigate('register')">Crear cuenta</a>
                        </div>
                        <div id="loginError" class="alert alert-danger d-none mb-0" role="alert"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
