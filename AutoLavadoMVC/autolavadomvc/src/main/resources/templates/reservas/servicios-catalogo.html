<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Servicios Ofrecidos')}">
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container my-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
            <div>
                <p class="text-uppercase text-muted fw-semibold mb-1">Catálogo</p>
                <h2 class="mb-0">Servicios ofrecidos</h2>
            </div>
            <div class="text-md-end">
                <p class="text-muted mb-1">Los servicios se cargan directamente desde la tabla <strong>servicio</strong>.</p>
                <a th:href="@{/}" class="link-success small">← Volver a inicio</a>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-4" th:each="servicio : ${servicios}">
                <div class="card shadow border-0 h-100 servicio-card overflow-hidden">
                    <div class="ratio ratio-4x3 bg-light">
                        <a href="#"
                           class="d-block w-100 h-100 text-decoration-none servicio-preview-link"
                           data-bs-toggle="modal"
                           data-bs-target="#servicioImagenModal"
                           th:if="${servicio.imagen != null and !#strings.isEmpty(servicio.imagen)}"
                           th:attr="data-imagen=${servicio.imagen},data-titulo=${servicio.servicio}">
                            <img class="w-100 h-100 object-fit-cover servicio-preview-image"
                                 th:src="@{/imgs/{imagen}(imagen=${servicio.imagen})}"
                                 th:alt="${servicio.servicio}">
                        </a>
                        <div class="d-flex align-items-center justify-content-center text-muted small"
                             th:if="${servicio.imagen == null or #strings.isEmpty(servicio.imagen)}">
                            Sin imagen disponible
                        </div>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start gap-3 mb-2">
                            <h5 class="card-title mb-0" th:text="${servicio.servicio}">Nombre del servicio</h5>
                            <span class="badge text-bg-dark" th:text="${servicio.id}">ID</span>
                        </div>
                        <p class="text-muted mb-3" th:text="${servicio.descripcion ?: 'Sin descripción'}">Descripción del servicio</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center gap-3">
                            <div class="text-end">
                                <div class="fs-4 fw-bold" th:text="${servicio.precio + ' €'}">8 €</div>
                                <small class="text-muted">Precio base</small>
                            </div>
                        </div>
                        <div class="mt-3">
                            <a th:href="@{/reservas/nueva(servicioId=${servicio.id})}" class="btn btn-primary w-100">Contratar</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="servicioImagenModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="servicioImagenModalLabel">Imagen ampliada</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body pt-2">
                    <img id="servicioImagenModalImg" class="img-fluid w-100 rounded-3 object-fit-cover" src="" alt="Imagen del servicio">
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
