<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lista de Reservas')}"></head>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="flex-grow-1">
    <div class="container my-4">
        <h2 class="mb-4">Reservas del Autolavado</h2>
 
        <!-- TODO 52: mostrar mensaje de éxito si existe -->
        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <p th:text="${mensajeExito}" class="mb-0"></p>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <!-- TODO 53: mostrar mensaje de error si existe --> 
        <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <p th:text="${mensajeError}" class="mb-0"></p>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
 
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/reservas/buscar}" method="get" class="row g-2 align-items-end mb-3">
                    <div class="col-12 col-md-7">
                        <label for="matricula" class="form-label">Matrícula</label>
                        <input type="text" id="matricula" name="matricula" class="form-control" placeholder="Buscar por matrícula" th:value="${matriculaBuscada}">
                    </div>
                    <div class="col-12 col-md-3">
                        <div class="form-check mt-md-4 pt-md-2">
                            <input class="form-check-input" type="checkbox" id="pendientes" name="pendientes" value="true" th:checked="${soloPendientes}">
                            <label class="form-check-label" for="pendientes">
                                Solo pendientes
                            </label>
                        </div>
                    </div>
                    <div class="col-12 col-md-2 d-grid">
                        <button type="submit" class="btn btn-secondary">Buscar</button>
                    </div>
                </form> 
                <!-- TODO 55: enlace para volver a /reservas y botón para nueva reserva --> 
                <div class="d-flex gap-2">
                    <a th:href="@{/reservas}" class="btn btn-outline-secondary">Limpiar filtros</a>
                    <a th:href="@{/reservas/nueva}" class="btn btn-primary">Nueva Reserva</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <!-- TODO 56: si la lista está vacía, mostrar mensaje informativo con th:if --> 
                <div th:if="${#lists.isEmpty(reservas)}" class="alert alert-info mb-0">
                    <p class="mb-0">No hay reservas para mostrar.</p>
                </div>

                <div th:if="${!#lists.isEmpty(reservas)}" class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Cliente</th><th>Matrícula</th>
                                <th>Servicio</th><th>Fecha</th><th>Hora</th>
                                <th>Precio</th><th>Estado</th><th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- TODO 57: crear una fila con th:each="r : ${reservas}" --> 
                            <tr th:each="r : ${reservas}">
                                <!-- TODO 58: usar th:text para cada dato -->
                                <td th:text="${r.id}"></td>
                                <td th:text="${r.nombreCliente}"></td>
                                <td th:text="${r.matricula}"></td>
                                <td th:text="${r.tipoServicio.descripcion}"></td>
                                <td th:text="${r.fecha}"></td>
                                <td th:text="${r.hora}"></td>
                                <td th:text="*{precio}"></td>
                                <td>
                                    <span class="badge" th:classappend="${r.estado == T(com.autolavado.autolavadomvc.model.EstadoReserva).PENDIENTE ? 'bg-warning' : (r.estado == T(com.autolavado.autolavadomvc.model.EstadoReserva).EN_PROCESO ? 'bg-info' : 'bg-success')}" th:text="${r.estado}"></span>
                                </td>
                                <td>
                                    <!-- TODO 59: enlace Ver detalle con th:href --> 
                                    <a th:href="@{/reservas/{id}(id=${r.id})}" class="btn btn-info btn-sm">Ver</a>
                                    <!-- TODO 60: formularios POST para iniciar/finalizar según estado -->
                                    <form th:if="${r.estado == T(com.autolavado.autolavadomvc.model.EstadoReserva).PENDIENTE}" th:action="@{/reservas/{id}/iniciar(id=${r.id})}" method="post" style="display:inline">
                                        <button type="submit" class="btn btn-warning btn-sm">Iniciar</button>
                                    </form>
                                    <form th:if="${r.estado == T(com.autolavado.autolavadomvc.model.EstadoReserva).EN_PROCESO}" th:action="@{/reservas/{id}/finalizar(id=${r.id})}" method="post" style="display:inline">
                                        <button type="submit" class="btn btn-success btn-sm">Finalizar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
