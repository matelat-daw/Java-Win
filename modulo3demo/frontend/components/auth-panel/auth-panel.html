<section class="app-panel login-panel fade-in-up">
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
        <div>
            <div class="text-uppercase small muted-copy mb-2">Autenticación</div>
            <h2 class="h3 mb-2">Inicia sesión en la API</h2>
            <p class="muted-copy mb-0">La sesión se mantiene con cookie del servidor para poder cerrar sesión desde la SPA.</p>
        </div>
        <span class="badge rounded-pill text-bg-info text-dark">Bootstrap 5.3.8</span>
    </div>

    <form class="row g-3" data-login-form>
        <div class="col-12">
            <label class="form-label" for="username">Usuario</label>
            <input id="username" name="username" type="text" class="form-control glass-input" autocomplete="username" placeholder="usuario o admin" required>
        </div>

        <div class="col-12">
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" name="password" type="password" class="form-control glass-input" autocomplete="current-password" placeholder="1234 o admin123" required>
        </div>

        <div class="col-12 d-flex flex-wrap gap-2 align-items-center justify-content-between">
            <button type="submit" class="btn btn-emerald px-4" data-login-button>Entrar</button>
            <div class="small muted-copy" data-login-status>Introduce tus credenciales para continuar.</div>
        </div>

        <div class="col-12">
            <div class="login-hint p-3">
                <div class="small text-uppercase muted-copy mb-2">Credenciales de prueba</div>
                <div class="d-flex flex-wrap gap-2">
                    <span class="badge text-bg-dark">usuario / 1234</span>
                    <span class="badge text-bg-dark">admin / admin123</span>
                </div>
            </div>
        </div>
    </form>
</section>
