<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Servicios Ofrecidos')"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="fragments/navbar :: navbar"></nav>
<main class="flex-grow-1">
    <div class="container my-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
            <div>
                <p class="text-uppercase text-muted fw-semibold mb-1">Catálogo</p>
                <h2 class="mb-0">Servicios ofrecidos</h2>
            </div>
            <div class="text-md-end">
                <p class="text-muted mb-1">Seis opciones pensadas para cubrir desde un lavado rápido hasta un detalle completo.</p>
                <a th:href="@{/}" class="link-success small">← Volver a inicio</a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-4" th:each="servicio : ${servicios}">
                <div class="card shadow border-0 h-100 servicio-card overflow-hidden">
                    <div class="ratio ratio-4x3">
                        <a href="#"
                                class="d-block w-100 h-100 p-0 border-0 text-decoration-none servicio-preview-link"
                                data-bs-toggle="modal"
                                data-bs-target="#servicioImagenModal"
                                th:attr="data-imagen=${servicio.imagen},data-titulo=${servicio.nombre}">
                            <img class="w-100 h-100 object-fit-cover servicio-preview-image" th:src="${servicio.imagen}" th:alt="${servicio.nombre}">
                        </a>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start gap-3 mb-2">
                            <h5 class="card-title mb-0" th:text="${servicio.nombre}">Nombre del servicio</h5>
                            <span class="badge text-bg-dark" th:text="${servicio.etiqueta}">Etiqueta</span>
                        </div>
                        <p class="text-muted mb-3" th:text="${servicio.descripcion}">Descripción del servicio</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center gap-3">
                            <div>
                                <div class="fw-semibold" th:text="${servicio.duracionMinutos + ' min'}">20 min</div>
                                <small class="text-muted">Duración estimada</small>
                            </div>
                            <div class="text-end">
                                <div class="fs-4 fw-bold" th:text="${servicio.precio + ' €'}">8 €</div>
                                <small class="text-muted">Precio final</small>
                            </div>
                        </div>
                        <div class="mt-3">
                            <a th:href="@{/reservas/nueva(tipoLavado=${servicio.tipoLavado.name()})}" class="btn btn-primary w-100">Contratar</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="servicioImagenModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title" id="servicioImagenModalLabel">Imagen ampliada</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body pt-2">
                        <img id="servicioImagenModalImg" class="img-fluid w-100 rounded-3 object-fit-cover" src="" alt="Imagen del servicio">
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="fragments/footer :: footer"></footer>
<style>
    .servicio-preview-link {
        cursor: zoom-in;
    }

    .servicio-preview-image {
        transition: transform 0.25s ease, filter 0.25s ease;
    }

    .servicio-preview-link:hover .servicio-preview-image,
    .servicio-preview-link:focus-visible .servicio-preview-image {
        transform: scale(1.05);
        filter: brightness(1.03);
    }

    .servicio-preview-link:focus-visible {
        outline: 0;
        box-shadow: inset 0 0 0 3px rgba(13, 110, 253, 0.35);
    }
</style>
<script>
    const servicioImagenModal = document.getElementById('servicioImagenModal');
    if (servicioImagenModal) {
        servicioImagenModal.addEventListener('show.bs.modal', function (event) {
            const trigger = event.relatedTarget;
            const imagen = trigger.getAttribute('data-imagen');
            const titulo = trigger.getAttribute('data-titulo');
            const modalImg = document.getElementById('servicioImagenModalImg');
            const modalTitle = document.getElementById('servicioImagenModalLabel');

            modalImg.src = imagen;
            modalImg.alt = titulo;
            modalTitle.textContent = titulo;
        });

        servicioImagenModal.addEventListener('hidden.bs.modal', function () {
            const modalImg = document.getElementById('servicioImagenModalImg');
            modalImg.src = '';
            modalImg.alt = 'Imagen del servicio';
            document.getElementById('servicioImagenModalLabel').textContent = 'Imagen ampliada';
        });
    }
</script>
</body>
</html>
