<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Auto Lavado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            :root { --footer-height: 72px; }
            /* Reserve space at the bottom so a fixed footer doesn't cover page content */
            body { padding-bottom: calc(var(--footer-height) + 1rem); }

            .hero-card-bg {
                background-image: url('/imgs/logo.webp');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                min-height: 420px;
            }

            .hero-text-shadow {
                text-shadow: 0 2px 6px rgba(0, 0, 0, 0.95), 0 0 2px rgba(0, 0, 0, 0.95);
            }

            .hero-cta {
                box-shadow: 0 0.9rem 1.8rem rgba(0, 0, 0, 0.35);
            }
        </style>
</head>
