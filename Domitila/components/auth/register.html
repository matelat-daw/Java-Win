<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Crear cuenta</h1>
                    <form id="registerForm" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nick</label>
                            <input class="form-control" name="nick" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" name="email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>
                            <input class="form-control" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input class="form-control" name="phone" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellido 1</label>
                            <input class="form-control" name="surname1" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellido 2 (opcional)</label>
                            <input class="form-control" name="surname2">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Género</label>
                            <select class="form-select" name="gender" required>
                                <option value="male">Varón</option>
                                <option value="female">Mujer</option>
                                <option value="other">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nacimiento (opcional)</label>
                            <input class="form-control" name="bday" placeholder="YYYY-MM-DD">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Contraseña</label>
                            <input class="form-control" type="password" name="password" required autocomplete="new-password">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary" type="submit">Registrarme</button>
                            <a class="btn btn-link" href="/login" onclick="event.preventDefault(); navigate('login')">Ya tengo cuenta</a>
                        </div>
                        <div class="col-12">
                            <div id="registerError" class="alert alert-danger d-none mb-0" role="alert"></div>
                            <div id="registerSuccess" class="alert alert-success d-none mb-0" role="alert"></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
