<section class="fade-in">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="page-title h2 mb-2">Contacto</h1>
            <p class="muted mb-0">El formulario envía el mensaje a la API.</p>
        </div>
        <a class="btn btn-outline-light" href="#/inicio">Inicio</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="panel p-4 h-100">
                <h2 class="h5 mb-3">Datos de la tienda</h2>
                <p class="mb-2"><strong>Empresa:</strong> Tienda Tech</p>
                <p class="mb-2"><strong>Teléfono:</strong> +34 123 456 789</p>
                <p class="mb-2"><strong>Correo:</strong> info@tiendatech.com</p>
                <p class="mb-0"><strong>Dirección:</strong> Calle Principal 123, Madrid, España</p>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="form-card p-4 p-lg-5">
                <div id="contacto-alert"></div>
                <form id="contacto-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input name="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo</label>
                        <input name="email" type="email" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Asunto</label>
                        <input name="asunto" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Mensaje</label>
                        <textarea name="mensaje" class="form-control" rows="5" required></textarea>
                    </div>
                    <div class="col-12 pt-2">
                        <button class="btn btn-info" type="submit">Enviar mensaje</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
