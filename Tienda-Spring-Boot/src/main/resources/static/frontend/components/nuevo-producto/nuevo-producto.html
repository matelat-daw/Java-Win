<section class="fade-in">
    <div class="mb-4">
        <a class="btn btn-outline-light" href="#/catalogo">← Volver</a>
    </div>

    <div class="form-card p-4 p-lg-5">
        <h1 class="page-title h2 mb-2">Nuevo producto</h1>
        <p class="muted mb-4">Formulario independiente del backend Thymeleaf.</p>
        <div id="nuevo-alert"></div>
        <form id="nuevo-form" class="row g-3" enctype="multipart/form-data">
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input name="nombre" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Precio</label>
                <input name="precio" type="number" step="0.01" min="0.01" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Stock</label>
                <input name="stock" type="number" step="1" min="0" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Categoría</label>
                <select name="categoria" class="form-select" id="nuevo-categoria" required>
                    <option value="">Selecciona una categoría</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4" required></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">Imagen</label>
                <input name="imagenFile" type="file" accept="image/*" class="form-control" required>
                <div class="form-text">JPG, PNG o WEBP.</div>
            </div>
            <div class="col-12 d-flex gap-2 flex-wrap pt-2">
                <button class="btn btn-success" type="submit">Guardar producto</button>
                <a class="btn btn-outline-light" href="#/catalogo">Cancelar</a>
            </div>
        </form>
    </div>
</section>
