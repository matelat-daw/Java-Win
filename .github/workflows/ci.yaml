name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo limpio
        uses: actions/checkout@v5

      - name: Configurar Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      # SOLUCIÓN DE INGENIERÍA: Desactivamos el escaneo automático del plugin de Spring Boot
      - name: Compilar y Ejecutar Pruebas con Bypass
        run: mvn clean test -Dspring-boot.repackage.skip=true -Dspring.classformat.ignore=true