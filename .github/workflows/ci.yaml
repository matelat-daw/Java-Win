name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      # CORREGIDO: Subimos la versión a Java 25 para que coincida con tu pom.xml
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # Concedemos permisos al wrapper nativo que viene en tu proyecto
      - name: Conceder permisos de ejecucion a mvnw
        run: chmod +x mvnw

      # Ejecutamos las pruebas usando el wrapper oficial
      - name: Ejecutar pruebas
        run: ./mvnw test
        
      - name: Construir aplicacion
        run: ./mvnw package