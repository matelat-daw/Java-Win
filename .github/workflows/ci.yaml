name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Activamos la bandera que nos pide el log de error para unificar a Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # v5 soluciona el aviso de obsolescencia de Node.js 20
      - name: Descargar el codigo
        uses: actions/checkout@v5

      # v5 es la versión oficial compatible con Java 25 en entornos modernos
      - name: Configurar Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # Permisos necesarios para ejecutar el comando local en Linux
      - name: Conceder permisos de ejecucion a mvnw
        run: chmod +x mvnw

      # Compilación guiada por el wrapper oficial
      - name: Ejecutar pruebas
        run: ./mvnw test
        
      - name: Construir aplicacion
        run: ./mvnw package