name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo limpio
        uses: actions/checkout@v5

      - name: Configurar Java 25 LTS
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          # No usamos la caché de Maven para forzar un entorno puro

      # SOLUCIÓN DE INFRAESTRUCTURA: Borrado físico de residuos en la nube
      - name: Purgar directorios corruptos de Windows
        run: rm -rf target/ .mvn/wrapper/maven-wrapper.jar

      - name: Ejecutar validacion estricta de pruebas
        run: mvn test