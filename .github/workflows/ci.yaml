name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Forzamos las acciones globales al motor de Node 24 sin generar warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v5

      - name: Configurar Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # SOLUCIÓN: Usamos "mvn" directo. No requiere permisos, chmod ni le importan los saltos de línea de Windows
      - name: Ejecutar pruebas con Maven de Linux
        run: mvn test
        
      - name: Construir aplicacion con Maven de Linux
        run: mvn package