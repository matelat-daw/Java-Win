name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4.2.2  # Versión compatible con Node 24

      - name: Configurar Java 25
        uses: actions/setup-java@v5    # Versión v5 que migra nativamente a Node 24
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Ejecutar pruebas
        run: ./mvnw test
        
      - name: Construir aplicacion
        run: ./mvnw package
