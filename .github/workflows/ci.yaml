name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Elimina el warning de Node.js 20 obligando a usar Node 24 de forma nativa
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Descarga el código usando v5 para alinearse con Node 24
      - name: Descargar el codigo
        uses: actions/checkout@v5

      # Configuración limpia de Java 25
      - name: Configurar Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      # Comando unificado: Compila la app y ejecuta con éxito todos tus tests con Mockito
      - name: Compilar y Ejecutar Pruebas
        run: mvn clean test