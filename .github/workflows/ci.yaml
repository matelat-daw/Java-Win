name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Corregido a v4 para evitar dependencias cruzadas con Node 20
      - name: Descargar el codigo
        uses: actions/checkout@v4

      # Corregido a v4 nativo con soporte directo para Java 25
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      # Conceder los accesos requeridos por Linux al empaquetador local
      - name: Conceder permisos de ejecucion a mvnw
        run: chmod +x mvnw

      # Ejecución controlada del flujo a través del compilador integrado
      - name: Ejecutar pruebas
        run: ./mvnw test
        
      - name: Construir aplicacion
        run: ./mvnw package