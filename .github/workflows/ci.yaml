name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v5

      # SOLUCIÓN: Cambiamos a Java 21 LTS para garantizar compatibilidad con Mockito
      - name: Configurar Java 21 para Compilación y Tests
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Ejecutamos directo usando los comandos globales del runner
      - name: Ejecutar pruebas
        run: mvn test
        
      - name: Construir aplicacion
        run: mvn package